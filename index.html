
<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GX Training</title>
<link rel="manifest" href="manifest.json">
<style>
body{font-family:system-ui,Arial;margin:0;background:#f4f6fb;color:#1f2937;}
header{padding:16px;font-size:22px;font-weight:700;}
.container{padding:16px;padding-bottom:90px;}
.card{background:white;border-radius:12px;padding:16px;margin-bottom:12px;box-shadow:0 2px 6px rgba(0,0,0,0.06);}
button{padding:10px 14px;border-radius:8px;border:none;background:#2563eb;color:white;cursor:pointer;margin-top:8px;}
.small{font-size:13px;color:#6b7280;margin-top:4px;}
</style>
</head>

<body>

<header>GX Training</header>

<div class="container">

<div class="card">
<b>Perfil</b>
<div class="small">
Idade: 33<br>
Altura: 1.75m<br>
Peso: 78kg<br>
BF estimado: ~25%
</div>
</div>

<div class="card">
<b>Objetivos</b>
<div class="small">
• Ganhar massa magra<br>
• Reduzir gordura abdominal<br>
• Prioridade: Peito e Ombro
</div>
</div>

<div class="card">
<b>Selecionar treino</b>
<button onclick="startWorkout(0)">Treino 1 — Peito Força</button>
<button onclick="startWorkout(1)">Treino 2 — Pernas Força</button>
<button onclick="startWorkout(2)">Treino 3 — Costas + Bíceps</button>
</div>

</div>

<script>

const workouts=[
[
{name:"Supino reto",sets:5,reps:6,weight:20},
{name:"Supino inclinado halter",sets:4,reps:10,weight:18}
],
[
{name:"Agachamento",sets:5,reps:5,weight:30},
{name:"Hip thrust",sets:4,reps:10,weight:30}
],
[
{name:"Puxada frente",sets:4,reps:10,weight:50},
{name:"Remada máquina",sets:4,reps:10,weight:50}
]
]

function startWorkout(index){
alert("Treino iniciado: "+workouts[index][0].name)
}

if ('serviceWorker' in navigator) {
navigator.serviceWorker.register('sw.js')
}

</script>

</body>
</html>
