
<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GX Training</title>
<link rel="manifest" href="manifest.json">
<link rel="stylesheet" href="style.css">
</head>

<body>

<header>GX Training</header>

<div class="container">

<div class="card">
<h3>Perfil</h3>
<p>Idade: 33</p>
<p>Altura: 1.75m</p>
<p>Peso: 78kg</p>
<p>BF estimado: ~25%</p>
</div>

<div class="card">
<h3>Objetivos</h3>
<ul>
<li>Ganhar massa magra</li>
<li>Reduzir gordura abdominal</li>
<li>Prioridade: Peito e Ombro</li>
</ul>
</div>

<div class="card">
<h3>Selecionar treino</h3>
<button onclick="loadWorkout('peito')">Treino 1 — Peito Força</button>
<button onclick="loadWorkout('pernas')">Treino 2 — Pernas Força</button>
<button onclick="loadWorkout('costas')">Treino 3 — Costas + Bíceps</button>
<button onclick="loadWorkout('ombro')">Treino 4 — Ombro</button>
</div>

<div id="workoutCard" class="card hidden">
<h3 id="workoutTitle"></h3>
<div id="exerciseList"></div>
</div>

<div id="feedbackCard" class="card hidden">
<h3>Feedback do treino</h3>
<textarea id="feedback" rows="4"></textarea>
<br>
<button onclick="analyzeFeedback()">Analisar treino</button>
<p id="coach"></p>
</div>

</div>

<script src="app.js"></script>

</body>
</html>
